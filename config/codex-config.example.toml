# QuantZhai Codex CLI config template.
#
# qz-codex copies this file to var/codex-home/config.toml on first run, then
# regenerates model_catalog_json on every launch. Model metadata, context
# windows, truncation limits, reasoning levels, and system prompts belong in the
# generated catalog, not in deprecated static profile blocks here.

model_catalog_json = "var/codex-home/model-catalogs/qwenzhai-models.json"
model = "Qwen3.6-35B-A3B-Abliterated-Heretic-Q4_K_M"
model_provider = "quantzhai"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[model_providers.quantzhai]
name = "QuantZhai"
base_url = "http://127.0.0.1:18180/v1"
wire_api = "responses"
env_key = "LOCAL_QWEN_API_KEY"
request_max_retries = 1
stream_max_retries = 1
stream_idle_timeout_ms = 600000
